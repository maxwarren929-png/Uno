services:
  - type: web
    name: uno-game
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: uno-db
          property: connectionString

databases:
  - name: uno-db
    databaseName: uno
    user: uno_user
    plan: free